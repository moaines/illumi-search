name: Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11', '12', '13']

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, intl, mbstring, pdo, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate

      - name: Install dependencies (Laravel ${{ matrix.laravel }})
        run: |
          composer install --no-interaction --no-progress
          if [ "${{ matrix.laravel }}" = "12" ]; then
            composer require "orchestra/testbench:^10.0" --no-interaction --no-progress --dev --with-all-dependencies
          elif [ "${{ matrix.laravel }}" = "13" ]; then
            composer require "orchestra/testbench:^11.0" --no-interaction --no-progress --dev --with-all-dependencies
          fi

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress || true
